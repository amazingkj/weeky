services:
  weeky:
    image: jiin724/weeky:latest
    ports:
      - "8080:8080"
    volumes:
      - weeky-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/weeky.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

volumes:
  weeky-data:
