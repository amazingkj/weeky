services:
  jugan:
    image: jiin724/jugan:latest
    ports:
      - "8080:8080"
    volumes:
      - jugan-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/jugan.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

volumes:
  jugan-data:
